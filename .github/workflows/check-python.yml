name: Check Python Compiles

on:
  pull_request:
    branches: [main]

jobs:
  compile-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yapf
        run: pip install yapf

      - name: Check all .py files compile
        run: python -m compileall -q .

      - name: Check code formatting with yapf
        run: yapf --diff --recursive .
